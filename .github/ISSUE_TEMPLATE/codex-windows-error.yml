name: Codex Windows error report
description: Report a Codex-on-Windows error with redacted diagnostics. English or Chinese is welcome.
title: "[case]: "
labels:
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for contributing. This is an unofficial community guide, not OpenAI support.

        English or Chinese is welcome. Raw reports are useful; you do not need to write a pull request.

        Start with the exact error text. Maintainers can normalize it into a case ID, guide update, dogfood row, and skill/reference update.

        Do not paste API keys, tokens, cookies, private repo names, raw `.codex` session files, or screenshots containing personal information.

        This tracker is for Codex-on-Windows failures. For general Codex tutorials, workflows, and non-Windows usage questions, start with CodexGuide: https://github.com/freestylefly/CodexGuide
  - type: dropdown
    id: contribution-type
    attributes:
      label: Contribution type
      description: Pick the closest path. This helps route the report into the data flywheel.
      options:
        - New error report
        - Additional environment detail for an existing case
        - Upstream GitHub issue or community source
        - Workaround validation
        - Guide correction
        - Unsure
    validations:
      required: true
  - type: textarea
    id: error
    attributes:
      label: Exact error text
      description: Paste the exact error block or screenshot text, redacted if needed.
      placeholder: |
        [info] Starting worktree creation
        fatal: invalid reference: master
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Codex surface
      options:
        - Windows app
        - CLI on Windows
        - IDE extension
        - WSL
        - Browser
        - Chrome extension
        - Computer Use
        - Microsoft Store / MSIX install
        - winget install
        - Unsure
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version family
      description: "Example: Windows 11 24H2, Windows 10 22H2, Windows Insider. Do not include hostnames or usernames."
    validations:
      required: false
  - type: input
    id: codex-version
    attributes:
      label: Codex version
      description: App or CLI version if available.
    validations:
      required: false
  - type: dropdown
    id: reproducibility
    attributes:
      label: Reproducibility
      description: How repeatable is this report?
      options:
        - Reproducible every time
        - Reproducible sometimes
        - Happened once
        - Fixed after workaround
        - Source link only
        - Unsure
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Redacted diagnostics
      description: Paste relevant output from the read-only diagnostic script after redaction.
      placeholder: |
        powershell -NoProfile -ExecutionPolicy Bypass -File ".\skills\codex-windows-troubleshooter\scripts\collect-codex-windows-diagnostics.ps1" -Workspace "<WORKSPACE>"
    validations:
      required: false
  - type: textarea
    id: links
    attributes:
      label: Related upstream issues or sources
      description: Link related openai/codex issues, docs, Reddit/V2EX posts, or prior reports.
    validations:
      required: false
  - type: dropdown
    id: evidence
    attributes:
      label: Evidence level
      description: Pick the strongest current evidence level.
      options:
        - A - official docs or official engineering post
        - B - reproducible openai/codex issue plus system behavior
        - C - community report only
        - D - inference, needs reproduction
        - Unsure
    validations:
      required: true
  - type: textarea
    id: workaround
    attributes:
      label: Workaround status
      description: What did you try, and was it safe/reversible?
    validations:
      required: false
  - type: checkboxes
    id: redaction-confirmation
    attributes:
      label: Redaction and reuse confirmation
      description: Public issue data may be summarized into the guide, matrix, and skill references.
      options:
        - label: I removed secrets, tokens, private repository names, personal paths, and private screenshots.
          required: true
        - label: This redacted report can be summarized into the public guide, dogfood matrix, and skill/reference files.
          required: true
